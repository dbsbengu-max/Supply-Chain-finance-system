# Copy to backend/scf-server/src/main/resources/application-prod.yml
# or mount as external config: spring.config.additional-location=file:/etc/scf/application-prod.yml
# All secrets MUST come from environment — do not commit real values.

spring:
  application:
    name: scf-server
  datasource:
    url: jdbc:postgresql://${SCF_DB_HOST:localhost}:${SCF_DB_PORT:5432}/${SCF_DB_NAME:scf}
    username: ${SCF_DB_USER:scf}
    password: ${SCF_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: scf
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    schemas: scf
    default-schema: scf
    locations: classpath:db/migration
    # Pilot prod: baseline-on-migrate false; never use clean in prod
    clean-disabled: true
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

scf:
  dev:
    password-bootstrap: false
  jwt:
    secret: ${SCF_JWT_SECRET}
    expiration-ms: ${SCF_JWT_EXPIRATION_MS:86400000}
  idempotency:
    retention-days: ${SCF_IDEMPOTENCY_RETENTION_DAYS:180}
  bank:
    callback:
      token: ${SCF_BANK_CALLBACK_TOKEN}
  contract:
    sign:
      default-provider: ${SCF_CONTRACT_SIGN_DEFAULT_PROVIDER:ESIGN_HTTP}
      callback-token: ${SCF_CONTRACT_SIGN_CALLBACK_TOKEN}
      max-retry-count: ${SCF_CONTRACT_SIGN_MAX_RETRY_COUNT:3}
      callback-verification-mode: ${SCF_CONTRACT_SIGN_CALLBACK_VERIFICATION_MODE:TIMESTAMP_NONCE_SIGNATURE}
      callback-signature-window-seconds: ${SCF_CONTRACT_SIGN_CALLBACK_SIGNATURE_WINDOW_SECONDS:300}
      compensation-pool-enabled: ${SCF_CONTRACT_SIGN_COMPENSATION_POOL_ENABLED:true}
      production-rollout:
        mode: ${SCF_CONTRACT_SIGN_ROLLOUT_MODE:OFF}
        production-provider: ${SCF_CONTRACT_SIGN_ROLLOUT_PRODUCTION_PROVIDER:ESIGN_HTTP}
        fallback-provider: ${SCF_CONTRACT_SIGN_ROLLOUT_FALLBACK_PROVIDER:MOCK}
        project-allowlist: ${SCF_CONTRACT_SIGN_ROLLOUT_PROJECT_ALLOWLIST:}
        operator-allowlist: ${SCF_CONTRACT_SIGN_ROLLOUT_OPERATOR_ALLOWLIST:}
        project-hash-percent: ${SCF_CONTRACT_SIGN_ROLLOUT_PROJECT_HASH_PERCENT:0}
        require-http-configured: ${SCF_CONTRACT_SIGN_ROLLOUT_REQUIRE_HTTP_CONFIGURED:true}
        block-when-misconfigured: ${SCF_CONTRACT_SIGN_ROLLOUT_BLOCK_WHEN_MISCONFIGURED:true}
      http-provider:
        enabled: ${SCF_CONTRACT_SIGN_HTTP_PROVIDER_ENABLED:true}
        provider-code: ${SCF_CONTRACT_SIGN_HTTP_PROVIDER_CODE:ESIGN_HTTP}
        display-name: ${SCF_CONTRACT_SIGN_HTTP_PROVIDER_DISPLAY_NAME:HTTP电子签章}
        base-url: ${SCF_CONTRACT_SIGN_HTTP_BASE_URL}
        create-path: ${SCF_CONTRACT_SIGN_HTTP_CREATE_PATH:/sign/create}
        status-path: ${SCF_CONTRACT_SIGN_HTTP_STATUS_PATH:/sign/status/{externalSignRef}}
        app-id: ${SCF_CONTRACT_SIGN_HTTP_APP_ID}
        app-secret: ${SCF_CONTRACT_SIGN_HTTP_APP_SECRET}
        outbound-auth-mode: ${SCF_CONTRACT_SIGN_HTTP_OUTBOUND_AUTH_MODE:HMAC_SHA256}
        private-key-pem: ${SCF_CONTRACT_SIGN_HTTP_PRIVATE_KEY_PEM:}
        public-key-pem: ${SCF_CONTRACT_SIGN_HTTP_PUBLIC_KEY_PEM:}
        platform-trace-header: ${SCF_CONTRACT_SIGN_HTTP_PLATFORM_TRACE_HEADER:X-Request-Id}
        vendor-request-id-header: ${SCF_CONTRACT_SIGN_HTTP_VENDOR_REQUEST_ID_HEADER:X-Vendor-Request-Id}
        vendor-trace-id-header: ${SCF_CONTRACT_SIGN_HTTP_VENDOR_TRACE_ID_HEADER:X-Vendor-Trace-Id}
        connect-timeout-ms: ${SCF_CONTRACT_SIGN_HTTP_CONNECT_TIMEOUT_MS:3000}
        read-timeout-ms: ${SCF_CONTRACT_SIGN_HTTP_READ_TIMEOUT_MS:10000}
  file:
    storage-dir: ${SCF_FILE_STORAGE_DIR:/var/scf/uploads}
    storage-bucket: ${SCF_FILE_STORAGE_BUCKET:pilot}
    max-size-bytes: ${SCF_FILE_MAX_SIZE_BYTES:10485760}
    allowed-extensions:
      - pdf
      - jpg
      - jpeg
      - png
      - xlsx
      - xls
      - doc
      - docx
    allowed-mime-types:
      - application/pdf
      - image/jpeg
      - image/png
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/msword

logging:
  level:
    root: ${SCF_LOG_LEVEL_ROOT:INFO}
    com.scf: ${SCF_LOG_LEVEL_COM_SCF:INFO}
  # External mount: file:/etc/scf/logback-spring.xml — see logging/LOGBACK_MOUNT_EVAL.md
  config: ${SCF_LOGBACK_CONFIG:classpath:logback-spring.xml}
