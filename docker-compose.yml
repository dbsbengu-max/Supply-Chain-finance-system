services:
  postgres:
    image: postgres:14-alpine
    container_name: scf-postgres
    environment:
      POSTGRES_DB: scf
      POSTGRES_USER: scf
      POSTGRES_PASSWORD: scf_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - scf_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scf -d scf"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  scf_pg_data:
