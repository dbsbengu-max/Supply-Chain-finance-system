spring:
  application:
    name: scf-server
  datasource:
    url: jdbc:postgresql://localhost:5432/scf
    username: scf
    password: scf_dev_pass
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: scf
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    schemas: scf
    default-schema: scf
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080
  servlet:
    context-path: /api/v1

scf:
  dev:
    password-bootstrap: true
  jwt:
    secret: scf-dev-jwt-secret-change-in-production-min-256-bits!!
    expiration-ms: 86400000
  idempotency:
    retention-days: 180
  bank:
    callback:
      token: mock-bank-callback-token
  contract:
    sign:
      default-provider: MOCK
      callback-token: mock-contract-sign-callback-token
      max-retry-count: 3
      callback-verification-mode: TOKEN
      callback-signature-window-seconds: 300
      compensation-pool-enabled: true
      http-provider:
        enabled: false
        provider-code: ESIGN_HTTP
        display-name: HTTP电子签章
        base-url: ''
        create-path: /sign/create
        status-path: /sign/status/{externalSignRef}
        app-id: ''
        app-secret: ''
        outbound-auth-mode: HMAC_SHA256
        platform-trace-header: X-Request-Id
        vendor-request-id-header: X-Vendor-Request-Id
        vendor-trace-id-header: X-Vendor-Trace-Id
        connect-timeout-ms: 3000
        read-timeout-ms: 10000
  file:
    storage-dir: ./data/uploads
    storage-bucket: local
    max-size-bytes: 10485760
    allowed-extensions:
      - pdf
      - jpg
      - jpeg
      - png
      - xlsx
      - xls
      - doc
      - docx
    allowed-mime-types:
      - application/pdf
      - image/jpeg
      - image/png
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/msword

logging:
  level:
    com.scf: DEBUG
