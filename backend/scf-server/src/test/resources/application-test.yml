spring:
  datasource:
    url: jdbc:h2:mem:scf;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE SCHEMA IF NOT EXISTS SCF\;CREATE DOMAIN IF NOT EXISTS SCF.TIMESTAMPTZ AS TIMESTAMP WITH TIME ZONE\;CREATE DOMAIN IF NOT EXISTS SCF.JSONB AS JSON
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: scf
  flyway:
    enabled: true
    schemas: scf
    default-schema: scf

scf:
  jwt:
    secret: test-jwt-secret-for-unit-tests-min-256-bits-long!!
    expiration-ms: 3600000
  bank:
    callback:
      token: mock-bank-callback-token
